name: PHPUnit (wp-env)

on:
  pull_request:
  push:
    branches:
      - main
      - trunk

jobs:
  phpunit:
    name: PHPUnit / PHP 8.3 / WC 9.5
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Start wp-env
        run: npx wp-env start

      - name: Run PHPUnit
        run: npx wp-env run tests-cli --env-cwd=wp-content/plugins/woo2odoo vendor/bin/phpunit
